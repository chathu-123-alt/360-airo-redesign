<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>360 AIRO - Sign In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Animated Background -->
<div class="bg-mesh">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="app-container">
  
  <!-- Left Side: Product Branding -->
  <div class="hero-section">
    <div class="brand">
      <div class="brand-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
          <path d="M2 17l10 5 10-5M2 12l10 5 10-5"></path>
        </svg>
      </div>
      <span>360 AIRO</span>
    </div>

    <div class="hero-content">
      <h1>Automate your outreach.<br><span class="text-gradient">Scale your pipeline.</span></h1>
      <p>Enterprise-grade B2B SaaS platform for managing multi-channel campaigns with advanced AI personalization.</p>
      
      <div class="stats-row">
        <div class="stat-item">
          <h3>2.4x</h3>
          <p>Higher Reply Rate</p>
        </div>
        <div class="stat-item">
          <h3>10k+</h3>
          <p>Active Campaigns</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Side: Login Form -->
  <div class="auth-section">
    <div class="auth-wrapper">
      
      <div class="auth-tabs">
        <button class="tab-btn active" onclick="window.location.href='index.html'">Log In</button>
        <button class="tab-btn" onclick="window.location.href='signup.html'">Sign Up</button>
      </div>

      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-subtitle">Log in to your 360 AIRO dashboard</p>

      <form onsubmit="handleDemoLogin(event)">
        <div class="form-group">
          <label>Work Email</label>
          <div class="input-icon-wrap">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            <input type="email" id="login-email" placeholder="name@company.com" required>
          </div>
        </div>

        <div class="form-group">
          <label>
            <span>Password</span>
            <a href="#" class="forgot-link">Forgot password?</a>
          </label>
          <div class="input-icon-wrap">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <input type="password" id="password" placeholder="••••••••" required>
            <button type="button" class="eye-btn" onclick="togglePassword()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="submit-btn">Login to Dashboard</button>
      </form>

    </div>
  </div>

</div>

<script>
  function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
  }

  function handleDemoLogin(e) {
    e.preventDefault();
    const emailInput = document.getElementById("login-email");
    if (emailInput && emailInput.value) {
      const email = emailInput.value.trim();
      localStorage.setItem('airo_login_email', email);
      
      // Basic extraction of name from email logic (e.g. name@company.com)
      if (!localStorage.getItem('airo_fname') || localStorage.getItem('airo_fname') === 'Chathurya') {
        const namePart = email.split('@')[0].split('.')[0];
        const capitalized = namePart.charAt(0).toUpperCase() + namePart.slice(1);
        localStorage.setItem('airo_fname', capitalized);
        localStorage.setItem('airo_lname', ''); 
      }
    }
    // Simulate login then redirect to dashboard
    window.location.href = 'dashboard.html';
  }
</script>

</body>
</html>

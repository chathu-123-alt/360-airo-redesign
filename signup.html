<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>360 AIRO - Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Animated Background -->
<div class="bg-mesh">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="app-container">
  
  <!-- Left Side: Product Branding -->
  <div class="hero-section">
    <div class="brand" style="top: 40px; left: 60px;">
      <div class="brand-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
          <path d="M2 17l10 5 10-5M2 12l10 5 10-5"></path>
        </svg>
      </div>
      <span>360 AIRO</span>
    </div>

    <div class="hero-content">
      <h1>Built for modern<br><span class="text-gradient">sales teams.</span></h1>
      <p>Join thousands of revenue teams closing more deals with our intelligent automation pipeline.</p>
      
      <div class="stats-row">
        <div class="stat-item">
          <h3>No Credit Card</h3>
          <p>Required to apply</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Side: Sign Up Form -->
  <div class="auth-section">
    <div class="auth-wrapper">
      
      <div class="auth-tabs">
        <button class="tab-btn" onclick="window.location.href='index.html'">Log In</button>
        <button class="tab-btn active" onclick="window.location.href='signup.html'">Sign Up</button>
      </div>

      <h2 class="auth-title">Apply for access</h2>
      <p class="auth-subtitle">Create a 360 AIRO account</p>

      <form onsubmit="handleDemoSignup(event)">
        <div style="display:flex; gap:16px;">
          <div class="form-group" style="flex:1;">
            <label>First Name</label>
            <div class="input-icon-wrap">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
              <input type="text" placeholder="John" required>
            </div>
          </div>
          <div class="form-group" style="flex:1;">
            <label>Last Name</label>
            <div class="input-icon-wrap">
              <input type="text" placeholder="Doe" style="padding-left:16px;" required>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Work Email</label>
          <div class="input-icon-wrap">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            <input type="email" placeholder="name@company.com" required>
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-icon-wrap">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <input type="password" id="password" placeholder="Create a strong password" required>
            <button type="button" class="eye-btn" onclick="togglePassword()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="submit-btn" style="margin-top: 10px;">Create Account</button>
        
        <p style="text-align:center; font-size:12px; color:var(--text-tertiary); margin-top:16px;">
          By creating an account, you agree to our <a href="#" style="color:var(--text-secondary); text-decoration:none;">Terms</a> & <a href="#" style="color:var(--text-secondary); text-decoration:none;">Privacy Policy</a>.
        </p>
      </form>

    </div>
  </div>

</div>

<script>
  function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
  }

  function handleDemoSignup(e) {
    e.preventDefault();
    // Simulate signup then redirect to login page
    window.location.href = 'index.html';
  }
</script>

</body>
</html>
